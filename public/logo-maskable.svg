<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background (NO rounded corners — OS/browser applies the mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!--
    Maskable safe zone = inner 80% → 51px padding on each side
    Content is centered within 410 x 410 (from ~51,51 to ~461,461)
  -->

  <!--
    Three overlapping circles: dim → medium → bright
    r=60, centers at 178, 248, 318  (spacing=70, overlap ~50 px each pair)
    Last circle right edge: 318+60=378
  -->
  <circle cx="178" cy="256" r="60" fill="white" opacity="0.32"/>
  <circle cx="248" cy="256" r="60" fill="white" opacity="0.68"/>
  <circle cx="318" cy="256" r="60" fill="white"/>

  <!--
    Chevron arrow — opens from x=386 (8px gap after last circle edge 378)
    right edge 432 — well within maskable safe zone (461)
  -->
  <path d="M386 212 L432 256 L386 300"
        stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
