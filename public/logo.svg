<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background with rounded corners (purpose: "any") -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Subtle centre-left glow for depth -->
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!--
    Three overlapping circles: dim → medium → bright
    r=68, centers at 168, 244, 320  (spacing=76, overlap ~60 px each pair)
    Last circle right edge: 320+68=388
  -->
  <circle cx="168" cy="256" r="68" fill="white" opacity="0.32"/>
  <circle cx="244" cy="256" r="68" fill="white" opacity="0.68"/>
  <circle cx="320" cy="256" r="68" fill="white"/>

  <!--
    Chevron arrow — opens from x=396 (8px gap after last circle edge 388)
    clearly readable against the blue background
  -->
  <path d="M396 206 L452 256 L396 306"
        stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
